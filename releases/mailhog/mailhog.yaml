---
# MailHog — faux serveur SMTP pour le développement / la démo
# Intercepte tous les emails envoyés par les fonctions OpenFaaS
# et les affiche dans une interface web.
#
# SMTP  : mailhog.mailhog.svc.cluster.local:1025  (pas d'auth, pas de TLS)
# WebUI : kubectl port-forward svc/mailhog 8025:8025 -n mailhog
#         puis ouvrir http://localhost:8025
apiVersion: v1
kind: Namespace
metadata:
  name: mailhog
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailhog
  namespace: mailhog
  labels:
    app: mailhog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mailhog
  template:
    metadata:
      labels:
        app: mailhog
    spec:
      containers:
        - name: mailhog
          image: mailhog/mailhog:latest
          ports:
            - name: smtp
              containerPort: 1025
            - name: http
              containerPort: 8025
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: mailhog
  namespace: mailhog
spec:
  selector:
    app: mailhog
  ports:
    - name: smtp
      port: 1025
      targetPort: 1025
    - name: http
      port: 8025
      targetPort: 8025
